<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location | Creamberg</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
      
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #87CEEB; 
            background: linear-gradient(135deg, #87CEEB 0%, #b0e2f5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

       
        .main-wrapper {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
        }


        .location-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: clamp(40px, 8vw, 60px);
            color: #222;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.5);
        }

      
        .map-container {
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        iframe {
            display: block;
            width: 100%;
            height: 400px;
            border: 0;
        }


        .back-home-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #222;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .back-home-btn:hover {
            background-color: #ff99cc; 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 153, 204, 0.4);
        }

        footer {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        footer p {
            font-size: 14px;
            color: #444;
            margin: 2px 0;
        }

        footer span {
            color: #d15c92; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="location-card">
            <h1>Find Us</h1>

            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3783.3503741865426!2d-88.3904574!3d18.3882772!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8f5bb174883907eb%3A0xe7677b102ef70d65!2sCreamberg%20Belize!5e0!3m2!1sen!2sbz!4v1710000000000!5m2!1sen!2sbz" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>

            <a href="Home.html" class="back-home-btn">← Back to Home</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Creamberg. All Rights Reserved.</p>
        <p>Designed by <span>Vadhir Chan, Gael Gomez, & Owen Innis</span></p>
    </footer>

</body>
</html>
